# /etc/nginx/sites-available/quarryhq
# Activar:  sudo ln -s /etc/nginx/sites-available/quarryhq /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
# HTTPS:    sudo certbot --nginx -d quarryhq.pro -d www.quarryhq.pro -d admin.quarryhq.pro

# www → dominio canónico
server {
    listen 80;
    listen [::]:80;
    server_name www.quarryhq.pro;
    return 301 https://quarryhq.pro$request_uri;
}

# Backend de administración: misma app, URL propia (el cliente muestra el
# panel admin y el servidor solo acepta los endpoints admin en este host)
server {
    listen 80;
    listen [::]:80;
    server_name admin.quarryhq.pro;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name quarryhq.pro;

    # WebSockets del chat (mantiene la conexión viva)
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
