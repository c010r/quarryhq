# /etc/nginx/sites-available/obstresla
# Activar:  sudo ln -s /etc/nginx/sites-available/obstresla /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
# HTTPS:    sudo certbot --nginx -d obstresla.pro -d www.obstresla.pro

# www → dominio canónico
server {
    listen 80;
    listen [::]:80;
    server_name www.obstresla.pro;
    return 301 http://obstresla.pro$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name obstresla.pro;

    # WebSockets del chat (mantiene la conexión viva)
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
    }

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
